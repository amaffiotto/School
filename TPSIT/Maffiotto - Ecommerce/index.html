<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Es.Ecommerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 shadow">
        <a class="navbar-brand fw-bold fs-4" href="#">ShopCSS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="#">Prodotti</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Offerte</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Chi siamo</a></li>
            </ul>
            <span class="badge bg-primary ms-3 fs-6 px-3 py-2">🛒 Carrello (<span id="cartCount">0</span>)</span>
        </div>
    </nav>

    <div class="container-fluid py-5 px-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold text-dark mb-0">I Nostri Prodotti</h1>
            <button class="btn btn-outline-primary fw-semibold px-4" id="toggleBtn" onclick="toggleView()">VISUALIZZA
                TABELLA</button>
        </div>

        <div id="gridView">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="productGrid">
            </div>
        </div>

        <div id="tableView" class="d-none">
            <div class="d-flex">
                <input type="text" id="ricerca" class="form-control mb-3 mt-3" placeholder="cerca per...">
                <button onclick="ricerca()" class="btn-outline-primary btn ">🔎 Cerca</button>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle shadow-sm rounded overflow-hidden">
                    <thead class="table-dark">
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Nome Prodotto</th>
                            <th scope="col">Descrizione</th>
                            <th scope="col">Prezzo</th>
                            <th scope="col">Sconto</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <small>&copy; 2026 ShopBoot. Tutti i diritti riservati.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>

    <script>
        
    </script>
</body>

</html>
